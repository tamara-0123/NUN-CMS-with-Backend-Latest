<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CMS</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="reset.css">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <img src="../Student pages/image.png" alt="Nile Logo" class="auth-logo">
            <h1>Reset Password</h1>
            <p>Enter your ID to receive a reset link</p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="identifier">Matric No. / Staff ID</label>
                    <input type="text" id="identifier" placeholder="Enter your ID" required>
                </div>

                <button type="submit" class="btn-primary">Send Reset Link</button>

                <div class="form-footer">
                    <a href="login.html" class="btn-secondary">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    <script src="api-config.js"></script>
    <script>
        document.getElementById("resetForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const identifier = document.getElementById("identifier").value;

            try {
                const data = await API_CONFIG.request('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ identifier })
                });

                if (data.success) {
                    alert("If an account exists with this ID, a reset link has been sent to the registered email.");
                    window.location.href = 'login.html';
                }
            } catch (error) {
                alert(error.message || "Failed to process request. Please contact the administrator.");
            }
        });
    </script>
</body>

</html>
